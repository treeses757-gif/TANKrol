<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Дуэль кругов</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #lobby {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
        }
        #lobby input, #lobby button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
        }
        #game {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #2a6f2a;
            position: relative;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #3a7e3a;
        }
        #roomInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        #playersList {
            margin-top: 20px;
            font-size: 18px;
        }
        .error {
            color: #ff6b6b;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>Дуэль кругов</h1>
        <button onclick="window.createRoom()">Создать комнату</button>
        <br>
        <input id="roomCodeInput" type="text" placeholder="Код комнаты" maxlength="6">
        <button onclick="window.joinRoomFromInput()">Присоединиться</button>
        <div id="playersList"></div>
        <div id="errorMessage" class="error"></div>
    </div>

    <div id="game">
        <canvas id="gameCanvas"></canvas>
        <div id="roomInfo">Комната: <span id="roomCodeSpan"></span> <button onclick="window.leaveRoom()">Выйти</button></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { 
            getDatabase, 
            ref, 
            set, 
            update, 
            onValue, 
            get, 
            remove 
        } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC-iLxizH1umfeHSUZHLvpAt6XNm21p90Y",
            authDomain: "tanksduel-b90c7.firebaseapp.com",
            projectId: "tanksduel-b90c7",
            storageBucket: "tanksduel-b90c7.firebasestorage.app",
            messagingSenderId: "952596856224",
            appId: "1:952596856224:web:aefd98cf1d768e9169f8c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentPlayerId = null;
        let currentRoomCode = null;
        let roomListener = null;
        let gameStateListener = null;
        let gameActive = false;

        // Позиции
        let myPos = { x: 200, y: 200 };
        let enemyPos = { x: 600, y: 200 };

        let canvas, ctx;

        signInAnonymously(auth).then((userCredential) => {
            currentPlayerId = userCredential.user.uid;
        }).catch(err => {
            console.error(err);
            showError('Ошибка авторизации');
        });

        function showError(msg) {
            document.getElementById('errorMessage').textContent = msg;
        }

        function generateRoomCode() {
            return Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        window.createRoom = async function() {
            if (!currentPlayerId) return showError('Авторизация...');
            try {
                const roomCode = generateRoomCode();
                const roomRef = ref(db, `rooms/${roomCode}`);
                const snapshot = await get(roomRef);
                if (snapshot.exists()) return createRoom();

                await set(roomRef, {
                    players: { [currentPlayerId]: true },
                    gameState: null
                });

                currentRoomCode = roomCode;
                document.getElementById('roomCodeSpan').textContent = roomCode;
                listenRoom(roomCode);
                showError('');
            } catch (err) {
                showError('Ошибка создания');
            }
        };

        window.joinRoomFromInput = async function() {
            if (!currentPlayerId) return showError('Авторизация...');
            const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!roomCode) return;
            await joinRoom(roomCode);
        };

        async function joinRoom(roomCode) {
            try {
                const roomRef = ref(db, `rooms/${roomCode}`);
                const snapshot = await get(roomRef);
                if (!snapshot.exists()) return showError('Комната не найдена');

                const players = snapshot.val().players || {};
                if (Object.keys(players).length >= 2) return showError('Комната полна');

                await update(ref(db, `rooms/${roomCode}/players`), { [currentPlayerId]: true });

                currentRoomCode = roomCode;
                document.getElementById('roomCodeSpan').textContent = roomCode;
                listenRoom(roomCode);
                showError('');
            } catch (err) {
                showError('Ошибка подключения');
            }
        }

        function listenRoom(roomCode) {
            const roomRef = ref(db, `rooms/${roomCode}`);
            if (roomListener) roomListener();
            roomListener = onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return leaveRoom('Комната закрыта');

                const players = data.players || {};
                const playerCount = Object.keys(players).length;
                document.getElementById('playersList').innerHTML = 
                    `<p>Игроков: ${playerCount}/2</p>` +
                    (playerCount === 2 ? '<p>Игра начинается...</p>' : '<p>Ожидание игрока...</p>');

                if (playerCount === 2 && data.gameState === null) {
                    startGame(roomCode, players);
                }
                if (playerCount === 2 && data.gameState !== null && !gameActive) {
                    showGameScreen();
                    listenGameState(roomCode);
                }
            });
        }

        function startGame(roomCode, players) {
            const playerIds = Object.keys(players);
            const gameState = {
                [playerIds[0]]: { x: 200, y: 200 },
                [playerIds[1]]: { x: 600, y: 200 }
            };
            set(ref(db, `rooms/${roomCode}/gameState`), gameState);
            showGameScreen();
            listenGameState(roomCode);
        }

        function showGameScreen() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            gameActive = true;
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            requestAnimationFrame(gameLoop);
        }

        function listenGameState(roomCode) {
            if (gameStateListener) gameStateListener();
            gameStateListener = onValue(ref(db, `rooms/${roomCode}/gameState`), (snapshot) => {
                const state = snapshot.val();
                if (!state) return;
                for (let id in state) {
                    if (id === currentPlayerId) myPos = state[id];
                    else enemyPos = state[id];
                }
            });
        }

        function gameLoop() {
            if (!gameActive) return;
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }

        let keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.key.startsWith('Arrow')) e.preventDefault();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updateGame() {
            if (!currentRoomCode || !currentPlayerId) return;
            const speed = 3;
            let moved = false;
            if (keys['ArrowUp']) { myPos.y -= speed; moved = true; }
            if (keys['ArrowDown']) { myPos.y += speed; moved = true; }
            if (keys['ArrowLeft']) { myPos.x -= speed; moved = true; }
            if (keys['ArrowRight']) { myPos.x += speed; moved = true; }
            if (moved) {
                myPos.x = Math.max(20, Math.min(canvas.width-20, myPos.x));
                myPos.y = Math.max(20, Math.min(canvas.height-20, myPos.y));
                update(ref(db), { [`rooms/${currentRoomCode}/gameState/${currentPlayerId}`]: myPos });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // враг красный
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(enemyPos.x, enemyPos.y, 20, 0, 2*Math.PI);
            ctx.fill();
            // свой синий
            ctx.fillStyle = 'blue';
            ctx.beginPath();
            ctx.arc(myPos.x, myPos.y, 20, 0, 2*Math.PI);
            ctx.fill();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.leaveRoom = function(reason = '') {
            if (currentPlayerId && currentRoomCode) {
                remove(ref(db, `rooms/${currentRoomCode}/players/${currentPlayerId}`));
            }
            currentRoomCode = null;
            gameActive = false;
            document.getElementById('lobby').style.display = 'block';
            document.getElementById('game').style.display = 'none';
            if (roomListener) roomListener();
            if (gameStateListener) gameStateListener();
            if (reason) showError(reason);
        };

        window.addEventListener('beforeunload', () => {
            if (currentPlayerId && currentRoomCode) {
                remove(ref(db, `rooms/${currentRoomCode}/players/${currentPlayerId}`));
            }
        });
    </script>
</body>
</html>
