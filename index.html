<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Дуэль кругов</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; background: #111; color: white; }
        #lobby {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #222; padding: 30px; border-radius: 10px; text-align: center;
        }
        #lobby input, #lobby button { margin: 10px; padding: 10px; font-size: 16px; }
        #roomCodeDisplay { font-size: 32px; font-weight: bold; color: yellow; margin: 20px 0; }
        #game { display: none; width: 100vw; height: 100vh; background: #2a6f2a; }
        #gameCanvas { width: 100%; height: 100%; }
        #roomInfo { position: absolute; top: 10px; left: 10px; background: black; padding: 5px 10px; border-radius: 5px; }
        #status { margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>Дуэль кругов</h1>
        <button id="createBtn">Создать комнату</button><br>
        <input id="roomCodeInput" type="text" placeholder="Код комнаты" maxlength="6">
        <button id="joinBtn">Присоединиться</button>
        <div id="roomCodeDisplay">——</div>
        <div id="status">Загрузка...</div>
    </div>
    <div id="game">
        <canvas id="gameCanvas"></canvas>
        <div id="roomInfo">Комната: <span id="roomCodeSpan"></span></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, update, onValue, get, remove } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        console.log('1. Скрипт загружен');

        const firebaseConfig = {
            apiKey: "AIzaSyC-iLxizH1umfeHSUZHLvpAt6XNm21p90Y",
            authDomain: "tanksduel-b90c7.firebaseapp.com",
            projectId: "tanksduel-b90c7",
            storageBucket: "tanksduel-b90c7.firebasestorage.app",
            messagingSenderId: "952596856224",
            appId: "1:952596856224:web:aefd98cf1d768e9169f8c5"
        };

        console.log('2. Конфиг:', firebaseConfig);

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        console.log('3. Firebase инициализирован');

        let currentPlayerId = null;
        let currentRoomCode = null;
        let roomListener = null;
        let gameListener = null;
        let gameActive = false;
        let myPos = { x: 200, y: 200 };
        let enemyPos = { x: 600, y: 200 };
        let canvas, ctx;

        signInAnonymously(auth).then(user => {
            currentPlayerId = user.user.uid;
            console.log('4. Авторизован, uid:', currentPlayerId);
            document.getElementById('status').textContent = 'Готов';
        }).catch(err => {
            console.error('5. Ошибка авторизации:', err);
            document.getElementById('status').textContent = 'Ошибка авторизации';
        });

        function generateCode() {
            return Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        document.getElementById('createBtn').onclick = async () => {
            console.log('6. Нажата кнопка создания');
            if (!currentPlayerId) { alert('Авторизация...'); return; }
            const code = generateCode();
            console.log('7. Попытка создать комнату с кодом:', code);
            try {
                const roomRef = ref(db, `rooms/${code}`);
                console.log('8. Ссылка на комнату:', roomRef.toString());
                const snap = await get(roomRef);
                console.log('9. Существует?', snap.exists());
                if (snap.exists()) {
                    console.log('10. Код занят, повтор');
                    return document.getElementById('createBtn').onclick();
                }
                await set(roomRef, {
                    players: { [currentPlayerId]: true },
                    gameState: null
                });
                console.log('11. Комната создана');
                currentRoomCode = code;
                document.getElementById('roomCodeDisplay').textContent = 'Код: ' + code;
                document.getElementById('roomCodeSpan').textContent = code;
                listenRoom(code);
            } catch (err) {
                console.error('12. Ошибка создания комнаты:', err);
                alert('Ошибка создания комнаты. Смотри консоль.');
            }
        };

        document.getElementById('joinBtn').onclick = async () => {
            console.log('13. Нажата кнопка присоединения');
            if (!currentPlayerId) { alert('Авторизация...'); return; }
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!code) return;
            console.log('14. Попытка присоединиться к коду:', code);
            try {
                const roomRef = ref(db, `rooms/${code}`);
                const snap = await get(roomRef);
                if (!snap.exists()) { alert('Комната не найдена'); return; }
                const players = snap.val().players || {};
                if (Object.keys(players).length >= 2) { alert('Комната полна'); return; }
                await update(ref(db, `rooms/${code}/players`), { [currentPlayerId]: true });
                console.log('15. Присоединились');
                currentRoomCode = code;
                document.getElementById('roomCodeDisplay').textContent = 'Код: ' + code;
                document.getElementById('roomCodeSpan').textContent = code;
                listenRoom(code);
            } catch (err) {
                console.error('16. Ошибка присоединения:', err);
                alert('Ошибка присоединения. Смотри консоль.');
            }
        };

        function listenRoom(code) {
            if (roomListener) roomListener();
            const roomRef = ref(db, `rooms/${code}`);
            roomListener = onValue(roomRef, (snap) => {
                const data = snap.val();
                console.log('17. Данные комнаты:', data);
                if (!data) { console.log('18. Комната удалена'); leaveRoom(); return; }
                const players = data.players || {};
                const count = Object.keys(players).length;
                document.getElementById('status').textContent = `Игроков: ${count}/2`;
                if (count === 2 && data.gameState === null) {
                    console.log('19. Два игрока, инициализация игры');
                    if (currentPlayerId === Object.keys(players)[0]) {
                        const gameState = {
                            [Object.keys(players)[0]]: { x: 200, y: 200 },
                            [Object.keys(players)[1]]: { x: 600, y: 200 }
                        };
                        set(ref(db, `rooms/${code}/gameState`), gameState);
                    }
                }
                if (count === 2 && data.gameState !== null && !gameActive) {
                    console.log('20. Запуск игры');
                    startGame();
                    listenGameState(code);
                }
            });
        }

        function listenGameState(code) {
            if (gameListener) gameListener();
            gameListener = onValue(ref(db, `rooms/${code}/gameState`), (snap) => {
                const state = snap.val();
                console.log('21. Состояние игры:', state);
                if (!state) return;
                for (let id in state) {
                    if (id === currentPlayerId) myPos = state[id];
                    else enemyPos = state[id];
                }
            });
        }

        function startGame() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            gameActive = true;
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameActive) return;
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }

        let keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.key.startsWith('Arrow') || e.code.startsWith('Key')) e.preventDefault();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updateGame() {
            if (!currentRoomCode || !currentPlayerId || !canvas) return;
            const speed = 3;
            let moved = false;
            if (keys['ArrowUp'] || keys['KeyW']) { myPos.y -= speed; moved = true; }
            if (keys['ArrowDown'] || keys['KeyS']) { myPos.y += speed; moved = true; }
            if (keys['ArrowLeft'] || keys['KeyA']) { myPos.x -= speed; moved = true; }
            if (keys['ArrowRight'] || keys['KeyD']) { myPos.x += speed; moved = true; }
            if (moved) {
                myPos.x = Math.max(20, Math.min(canvas.width - 20, myPos.x));
                myPos.y = Math.max(20, Math.min(canvas.height - 20, myPos.y));
                update(ref(db), { [`rooms/${currentRoomCode}/gameState/${currentPlayerId}`]: myPos });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'red';
            ctx.beginPath(); ctx.arc(enemyPos.x, enemyPos.y, 20, 0, 2 * Math.PI); ctx.fill();
            ctx.fillStyle = 'blue';
            ctx.beginPath(); ctx.arc(myPos.x, myPos.y, 20, 0, 2 * Math.PI); ctx.fill();
        }

        function resizeCanvas() { if (canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } }

        function leaveRoom() {
            if (currentPlayerId && currentRoomCode) {
                remove(ref(db, `rooms/${currentRoomCode}/players/${currentPlayerId}`));
            }
            currentRoomCode = null; gameActive = false;
            document.getElementById('lobby').style.display = 'block';
            document.getElementById('game').style.display = 'none';
            document.getElementById('roomCodeDisplay').textContent = '——';
            if (roomListener) roomListener();
            if (gameListener) gameListener();
        }

        window.addEventListener('beforeunload', () => {
            if (currentPlayerId && currentRoomCode) {
                remove(ref(db, `rooms/${currentRoomCode}/players/${currentPlayerId}`));
            }
        });
    </script>
</body>
</html>
