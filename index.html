<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Дуэль кругов</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #lobby {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
            min-width: 300px;
        }
        #lobby input, #lobby button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
        }
        #roomCodeDisplay {
            font-size: 32px;
            font-weight: bold;
            color: yellow;
            margin: 20px 0;
            min-height: 40px;
            background: #333;
            padding: 10px;
            border-radius: 5px;
        }
        #game {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #2a6f2a;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
        }
        #roomInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: black;
            padding: 5px 10px;
            border-radius: 5px;
        }
        #status {
            margin-top: 10px;
            color: #aaa;
        }
        .hint {
            color: #ffaa00;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>Дуэль кругов</h1>
        <button id="createBtn">Создать комнату</button>
        <br>
        <input id="roomCodeInput" type="text" inputmode="text" placeholder="Код комнаты (буквы и цифры)" maxlength="6" autocapitalize="characters" autocorrect="off">
        <button id="joinBtn">Присоединиться</button>
        <div id="roomCodeDisplay">——</div>
        <div id="status">Подключение к Firebase...</div>
        <div class="hint">Если код не появляется, откройте консоль (F12)</div>
    </div>

    <div id="game">
        <canvas id="gameCanvas"></canvas>
        <div id="roomInfo">Комната: <span id="roomCodeSpan"></span></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, update, onValue, get, remove } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        console.log('Скрипт загружен');

        const firebaseConfig = {
            apiKey: "AIzaSyC-iLxizH1umfeHSUZHLvpAt6XNm21p90Y",
            authDomain: "tanksduel-b90c7.firebaseapp.com",
            projectId: "tanksduel-b90c7",
            storageBucket: "tanksduel-b90c7.firebasestorage.app",
            messagingSenderId: "952596856224",
            appId: "1:952596856224:web:aefd98cf1d768e9169f8c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentPlayerId = null;
        let currentRoomCode = null;
        let roomListener = null;
        let gameListener = null;
        let gameActive = false;

        let myPos = { x: 200, y: 200 };
        let enemyPos = { x: 600, y: 200 };
        let canvas, ctx;

        signInAnonymously(auth).then(user => {
            currentPlayerId = user.user.uid;
            console.log('Авторизован, uid:', currentPlayerId);
            document.getElementById('status').textContent = 'Готов';
        }).catch(err => {
            console.error('Ошибка авторизации Firebase:', err);
            document.getElementById('status').textContent = 'Ошибка авторизации. Проверьте настройки Firebase.';
        });

        function generateCode() {
            return Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        document.getElementById('createBtn').onclick = async () => {
            console.log('Нажата кнопка создания');
            if (!currentPlayerId) {
                alert('Авторизация...');
                return;
            }
            const code = generateCode();
            console.log('Пробуем код:', code);
            const roomRef = ref(db, `rooms/${code}`);
            try {
                const snap = await get(roomRef);
                if (snap.exists()) {
                    console.log('Код занят, повтор');
                    return document.getElementById('createBtn').onclick();
                }
                await set(roomRef, {
                    players: { [currentPlayerId]: true },
                    gameState: null
                });
                console.log('Комната создана, код:', code);
                currentRoomCode = code;
                document.getElementById('roomCodeDisplay').textContent = 'Код: ' + code;
                document.getElementById('roomCodeSpan').textContent = code;
                listenRoom(code);
            } catch (err) {
                console.error('Ошибка при создании комнаты:', err);
                alert('Ошибка создания комнаты. Смотрите консоль.');
            }
        };

        document.getElementById('joinBtn').onclick = async () => {
            console.log('Нажата кнопка присоединения');
            if (!currentPlayerId) {
                alert('Авторизация...');
                return;
            }
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!code) return;
            console.log('Попытка присоединиться к коду:', code);
            try {
                const roomRef = ref(db, `rooms/${code}`);
                const snap = await get(roomRef);
                if (!snap.exists()) {
                    alert('Комната не найдена');
                    return;
                }
                const players = snap.val().players || {};
                if (Object.keys(players).length >= 2) {
                    alert('Комната полна');
                    return;
                }
                await update(ref(db, `rooms/${code}/players`), { [currentPlayerId]: true });
                console.log('Присоединились к комнате:', code);
                currentRoomCode = code;
                document.getElementById('roomCodeDisplay').textContent = 'Код: ' + code;
                document.getElementById('roomCodeSpan').textContent = code;
                listenRoom(code);
            } catch (err) {
                console.error('Ошибка при присоединении:', err);
                alert('Ошибка присоединения. Смотрите консоль.');
            }
        };

        function listenRoom(code) {
            if (roomListener) roomListener();
            const roomRef = ref(db, `rooms/${code}`);
            roomListener = onValue(roomRef, (snap) => {
                const data = snap.val();
                if (!data) {
                    console.log('Комната удалена');
                    leaveRoom();
                    return;
                }
                const players = data.players || {};
                const count = Object.keys(players).length;
                document.getElementById('status').textContent = `Игроков: ${count}/2`;
                if (count === 2 && data.gameState === null) {
                    console.log('Два игрока, инициализация игры');
                    if (currentPlayerId === Object.keys(players)[0]) {
                        const gameState = {
                            [Object.keys(players)[0]]: { x: 200, y: 200 },
                            [Object.keys(players)[1]]: { x: 600, y: 200 }
                        };
                        set(ref(db, `rooms/${code}/gameState`), gameState);
                    }
                }
                if (count === 2 && data.gameState !== null && !gameActive) {
                    console.log('Запуск игры');
                    startGame();
                    listenGameState(code);
                }
            });
        }

        function listenGameState(code) {
            if (gameListener) gameListener();
            gameListener = onValue(ref(db, `rooms/${code}/gameState`), (snap) => {
                const state = snap.val();
                if (!state) return;
                for (let id in state) {
                    if (id === currentPlayerId) myPos = state[id];
                    else enemyPos = state[id];
                }
            });
        }

        function startGame() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            gameActive = true;
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameActive) return;
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }

        let keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.key.startsWith('Arrow') || e.code.startsWith('Key')) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updateGame() {
            if (!currentRoomCode || !currentPlayerId || !canvas) return;
            const speed = 3;
            let moved = false;

            if (keys['ArrowUp'] || keys['KeyW']) { myPos.y -= speed; moved = true; }
            if (keys['ArrowDown'] || keys['KeyS']) { myPos.y += speed; moved = true; }
            if (keys['ArrowLeft'] || keys['KeyA']) { myPos.x -= speed; moved = true; }
            if (keys['ArrowRight'] || keys['KeyD']) { myPos.x += speed; moved = true; }

            if (moved) {
                myPos.x = Math.max(20, Math.min(canvas.width - 20, myPos.x));
                myPos.y = Math.max(20, Math.min(canvas.height - 20, myPos.y));
                update(ref(db), { [`rooms/${currentRoomCode}/gameState/${currentPlayerId}`]: myPos });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(enemyPos.x, enemyPos.y, 20, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = 'blue';
            ctx.beginPath();
            ctx.arc(myPos.x, myPos.y, 20, 0, 2 * Math.PI);
            ctx.fill();
        }

        function resizeCanvas() {
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        }

        function leaveRoom() {
            if (currentPlayerId && currentRoomCode) {
                remove(ref(db, `rooms/${currentRoomCode}/players/${currentPlayerId}`));
            }
            currentRoomCode = null;
            gameActive = false;
            document.getElementById('lobby').style.display = 'block';
            document.getElementById('game').style.display = 'none';
            document.getElementById('roomCodeDisplay').textContent = '——';
            if (roomListener) roomListener();
            if (gameListener) gameListener();
        }

        window.addEventListener('beforeunload', () => {
            if (currentPlayerId && currentRoomCode) {
                remove(ref(db, `rooms/${currentRoomCode}/players/${currentPlayerId}`));
            }
        });
    </script>
</body>
</html>
